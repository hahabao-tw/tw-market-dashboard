name: 更新市場資料

on:
  schedule:
    # GitHub 排程用 UTC 時間;台北時間 = UTC + 8
    - cron: '55 6 * * 1-5'   # 台北 14:55
    - cron: '15 7 * * 1-5'   # 台北 15:15
    - cron: '40 7 * * 1-5'   # 台北 15:40
    - cron: '0 9 * * 1-5'    # 台北 17:00 保險班次
    - cron: '0 13 * * 1-5'   # 台北 21:00 抓證交所融資資料
  workflow_dispatch: {}      # 允許手動觸發

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 抓取資料
        env:
          FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
        run: python scripts/fetch_data.py

      - name: 提交更新
        run: |
          git config user.name "market-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "沒有新資料,不提交"
          else
            git commit -m "更新資料 $(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M')"
            git pull --rebase
            git push
          fi
